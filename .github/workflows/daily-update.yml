name: Market & News Data Pipeline

# ─── WHY TWO JOBS INSTEAD OF ONE ──────────────────────────────────────────────
#
# The old design had ONE job that used HOUR=$(date -u +"%H") to decide whether
# to run the master pipeline or the news update. GitHub Actions frequently delays
# scheduled runs by 15-90 minutes under high load. If the 22:00 UTC cron started
# at 23:05 UTC, HOUR="23" → fell into the else branch → ran the news script
# instead of the master. This is why Supabase and GitHub CSV had no new data
# after April 3 — the master run silently never fired.
#
# FIX: Two jobs with separate schedule triggers. Each job knows its own purpose.
# No clock detection. A 90-minute GitHub delay cannot misroute a job.

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9:00 AM ET  — intraday news (job: intraday-news)
    - cron: '0 18 * * 1-5'   # 1:00 PM ET  — intraday news (job: intraday-news)
    - cron: '15 21 * * 1-5'  # 4:15 PM ET  — intraday news (job: intraday-news)
    - cron: '0 22 * * 1-5'   # 5:00 PM ET  — EOD master + matrix (job: eod-master)

  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which engine to run manually?'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - news
          - matrix

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: EOD MASTER
  # Runs at 22:00 UTC (5 PM ET) — after US market close + EOD processing.
  # Scores all 18 stocks, writes Supabase, updates Redis, commits score CSV.
  # Immediately followed by correlation matrix recalculation.
  # ════════════════════════════════════════════════════════════════════════════
  eod-master:
    name: EOD Master + Matrix
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'master')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run master update + correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:      ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:          ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run update && npm run calculate-matrix

      - name: Run Earnings Event Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run earnings-event || true

      - name: Run Filing Narrative Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run filing-narrative || true

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit score history CSV
        run: |
          git add backend/data/score_history.csv || true
          git commit -m "📊 EOD $(date -u +%Y-%m-%d)" || true
          git pull --rebase origin main || true
          git push || true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: INTRADAY NEWS
  # Runs 3x daily at 9 AM, 1 PM, 4:15 PM ET.
  # Updates news sentiment scores in Redis. Does NOT touch Supabase scores
  # or the CSV. EOD master reads intraday news log at 5 PM to build final score.
  # ════════════════════════════════════════════════════════════════════════════
  intraday-news:
    name: Intraday News Update
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 14 * * 1-5' ||
        github.event.schedule == '0 18 * * 1-5' ||
        github.event.schedule == '15 21 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'news')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run intraday news update
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run update:news

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: MATRIX ONLY (manual trigger)
  # Recalculates correlation matrix without running the full master pipeline.
  # Use when you've added/removed stocks and want updated correlations immediately.
  # ════════════════════════════════════════════════════════════════════════════
  correlation-matrix:
    name: Correlation Matrix Only
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'matrix'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run calculate-matrix

# ─── SCHEDULE SUMMARY ─────────────────────────────────────────────────────────
# 0 14 * * 1-5  = Mon-Fri 9:00 AM ET  → intraday-news
# 0 18 * * 1-5  = Mon-Fri 1:00 PM ET  → intraday-news
# 15 21 * * 1-5 = Mon-Fri 4:15 PM ET  → intraday-news
# 0 22 * * 1-5  = Mon-Fri 5:00 PM ET  → eod-master (scores + matrix + CSV)
