name: Market & News Data Pipeline

# ─── SCHEDULING PHILOSOPHY ────────────────────────────────────────────────────
#
# GitHub Actions cron runs in UTC. Eastern Time observes DST:
#   EST (Nov → Mar): UTC-5     EDT (Mar → Nov): UTC-4
#
# The cron times below are chosen as the best UTC compromise so that
# scheduled slots land at reasonable ET times in BOTH EST and EDT:
#
#   Slot 1  13:30 UTC  =  8:30 AM EST  /  9:30 AM EDT  (at market open)
#   Slot 2  17:00 UTC  = 12:00 PM EST  /  1:00 PM EDT  (midday)
#   Slot 3  20:45 UTC  =  3:45 PM EST  /  4:45 PM EDT  (near/post close)
#   Master  22:00 UTC  =  5:00 PM EST  /  6:00 PM EDT  (well after close)
#
# OLD PROBLEM (fixed):
#   Slot 1 was 14:00 UTC = 9:00 AM EST but 10:00 AM EDT —
#   missing the opening 30 minutes of the session every day Mar-Nov.
#   Slot 3 was 21:15 UTC = 4:15 PM EST but 5:15 PM EDT.
#
# MANUAL RUNS: workflow_dispatch sets FORCE_RUN=true in the step env.
# The scripts check this var and skip the market-closed gate so you can
# run master/news/matrix on weekends/holidays without the job exiting early.
#
# WHY TWO JOBS: the old single-job design used HOUR=$(date -u +"%H") to route.
# GitHub Actions delays of 15-90 mins caused news to run instead of master.
# Separate jobs with separate schedule triggers eliminate this completely.

on:
  schedule:
    - cron: '30 13 * * 1-5'  # Slot 1:  8:30 AM EST /  9:30 AM EDT → intraday-news
    - cron: '0 17 * * 1-5'   # Slot 2: 12:00 PM EST /  1:00 PM EDT → intraday-news
    - cron: '45 20 * * 1-5'  # Slot 3:  3:45 PM EST /  4:45 PM EDT → intraday-news
    - cron: '0 22 * * 1-5'   # Master:  5:00 PM EST /  6:00 PM EDT → eod-master

  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which engine to run manually?'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - news
          - matrix

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: EOD MASTER
  # Runs at 22:00 UTC — after US market close in both EST and EDT.
  # FORCE_RUN=true on manual dispatch bypasses the market-closed gate.
  # ════════════════════════════════════════════════════════════════════════════
  eod-master:
    name: EOD Master + Matrix
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'master')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run master update
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:      ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:          ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          # FORCE_RUN=true on manual dispatch → skips market-closed gate in daily-update.js
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: npm run update

      - name: Run correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run generate-correlation

      - name: Run Earnings Event Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run earnings-event || true

      - name: Run Filing Narrative Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run filing-narrative || true

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit score history CSV
        run: |
          git add backend/data/score_history.csv || true
          git commit -m "📊 EOD $(date -u +%Y-%m-%d)" || true
          git pull --rebase origin main || true
          git push || true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: INTRADAY NEWS
  # 3 slots per day — DST-aware UTC times (see header for full breakdown).
  # FORCE_RUN=true on manual dispatch bypasses any market-closed logic.
  # ════════════════════════════════════════════════════════════════════════════
  intraday-news:
    name: Intraday News Update
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 13 * * 1-5' ||
        github.event.schedule == '0 17 * * 1-5'  ||
        github.event.schedule == '45 20 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'news')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run intraday news update
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: npm run update:news

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: MATRIX ONLY (manual trigger)
  # Recalculates correlation matrix without the full master pipeline.
  # Use after adding/removing stocks for immediate correlation update.
  # ════════════════════════════════════════════════════════════════════════════
  correlation-matrix:
    name: Correlation Matrix Only
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'matrix'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run generate-correlation

# ─── SCHEDULE SUMMARY ─────────────────────────────────────────────────────────
# 30 13 * * 1-5  = Mon-Fri  8:30 AM EST /  9:30 AM EDT  → intraday-news slot 1
#  0 17 * * 1-5  = Mon-Fri 12:00 PM EST /  1:00 PM EDT  → intraday-news slot 2
# 45 20 * * 1-5  = Mon-Fri  3:45 PM EST /  4:45 PM EDT  → intraday-news slot 3
#  0 22 * * 1-5  = Mon-Fri  5:00 PM EST /  6:00 PM EDT  → eod-master
