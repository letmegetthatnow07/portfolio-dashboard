name: Market & News Data Pipeline

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9:00 AM ET  — News Slot 1
    - cron: '0 18 * * 1-5'   # 1:00 PM ET  — News Slot 2
    - cron: '15 21 * * 1-5'  # 4:15 PM ET  — News Slot 3
    - cron: '0 22 * * 1-5'   # 5:00 PM ET  — EOD Master
    - cron: '30 22 * * 1-5'  # 5:30 PM ET  — Correlation Matrix

  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which engine to run?'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - news
          - matrix

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Determine Run Type
        id: run-logic
        run: |
          HOUR=$(date -u +"%H")
          MINUTE=$(date -u +"%M")

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.run_type }}"
            if [ "$TYPE" == "master" ]; then
              echo "SCRIPT_TO_RUN=npm run update && npm run calculate-matrix" >> $GITHUB_ENV
            elif [ "$TYPE" == "matrix" ]; then
              echo "SCRIPT_TO_RUN=npm run calculate-matrix" >> $GITHUB_ENV
            else
              echo "SCRIPT_TO_RUN=npm run update:news" >> $GITHUB_ENV
            fi

          elif [ "$HOUR" == "22" ]; then
            # Strip leading zero before arithmetic comparison
            MIN=$(echo "$MINUTE" | sed 's/^0*//')
            MIN=${MIN:-0}
            if [ "$MIN" -le 20 ]; then
              echo "SCRIPT_TO_RUN=npm run update" >> $GITHUB_ENV
            else
              echo "SCRIPT_TO_RUN=npm run calculate-matrix" >> $GITHUB_ENV
            fi

          else
            echo "SCRIPT_TO_RUN=npm run update:news" >> $GITHUB_ENV
          fi

      - name: Execute Pipeline
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:      ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:          ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: ${{ env.SCRIPT_TO_RUN }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit CSV History
        run: |
          git add backend/data/score_history.csv || true
          git commit -m "📊 Auto: EOD History $(date)" || true
          git pull --rebase origin main || true
          git push || true
