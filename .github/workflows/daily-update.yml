name: Daily Market Data Update

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd backend
          npm install
      
      - name: Initialize database
        run: |
          cd backend
          npm run init-db || true
      
      - name: Fetch and update market data
        run: |
          cd backend
          npm run update
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          SEC_API_KEY: ${{ secrets.SEC_API_KEY }}
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/stocks.db || true
          git add backend/logs/* || true
          git commit -m "📊 Daily market data update - $(date +'%Y-%m-%d %H:%M:%S')" || true
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
