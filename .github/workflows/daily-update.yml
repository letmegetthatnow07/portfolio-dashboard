name: Portfolio Pipeline

on:
  schedule:
    # Slot 1  — 9:00 AM ET  = 14:00 UTC
    - cron: '0 14 * * 1-5'
    # Slot 2  — 1:00 PM ET  = 18:00 UTC
    - cron: '0 18 * * 1-5'
    # Slot 3  — 4:15 PM ET  = 21:15 UTC
    - cron: '15 21 * * 1-5'
    # EOD     — 5:00 PM ET  = 22:00 UTC
    - cron: '0 22 * * 1-5'
    # Matrix  — 5:30 PM ET  = 22:30 UTC  (30 min after EOD finishes)
    - cron: '30 22 * * 1-5'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'update'
        type: choice
        options:
          - news
          - update
          - matrix
          - all

env:
  REDIS_URL:            ${{ secrets.REDIS_URL }}
  FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
  NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
  FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
  POLYGON_API_KEY:      ${{ secrets.POLYGON_API_KEY }}
  SEC_API_KEY:          ${{ secrets.SEC_API_KEY }}
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Resolve task
        id: task
        run: |
          MANUAL="${{ github.event.inputs.job }}"
          if [ -n "$MANUAL" ]; then
            echo "task=$MANUAL" >> "$GITHUB_OUTPUT"
            echo "Triggered manually: $MANUAL"
            exit 0
          fi

          HHMM=$(date -u +%H%M)
          echo "UTC HHMM = $HHMM"

          if [ "$HHMM" = "1400" ] || [ "$HHMM" = "1800" ] || [ "$HHMM" = "2115" ]; then
            echo "task=news" >> "$GITHUB_OUTPUT"
          elif [ "$HHMM" = "2200" ]; then
            echo "task=update" >> "$GITHUB_OUTPUT"
          elif [ "$HHMM" = "2230" ]; then
            echo "task=matrix" >> "$GITHUB_OUTPUT"
          else
            HH=$(date -u +%H)
            if [ "$HH" = "14" ] || [ "$HH" = "18" ] || [ "$HH" = "21" ]; then
              echo "task=news" >> "$GITHUB_OUTPUT"
            elif [ "$HH" = "22" ]; then
              MM=$(date -u +%M | sed 's/^0*//')
              MM=${MM:-0}
              if [ "$MM" -le 20 ]; then
                echo "task=update" >> "$GITHUB_OUTPUT"
              else
                echo "task=matrix" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "task=update" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run news update
        if: steps.task.outputs.task == 'news' || steps.task.outputs.task == 'all'
        working-directory: backend
        run: npm run update:news

      - name: Run EOD master update
        if: steps.task.outputs.task == 'update' || steps.task.outputs.task == 'all'
        working-directory: backend
        run: npm run update

      - name: Run correlation matrix
        if: steps.task.outputs.task == 'matrix' || steps.task.outputs.task == 'all'
        working-directory: backend
        run: npm run calculate-matrix
