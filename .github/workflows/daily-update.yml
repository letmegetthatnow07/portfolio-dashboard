name: Portfolio Pipeline

on:
  schedule:
    # Slot 1 — 9:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 1-5'
    # Slot 2 — 1:00 PM ET (18:00 UTC)
    - cron: '0 18 * * 1-5'
    # Slot 3 — 4:15 PM ET (21:15 UTC)
    - cron: '15 21 * * 1-5'
    # EOD Master — 5:00 PM ET (22:00 UTC)
    - cron: '0 22 * * 1-5'
    # Correlation matrix — 5:30 PM ET (22:30 UTC), after EOD master has finished
    # Runs every trading day so the heatmap is always current and deleted stocks
    # are removed automatically on the next recalculation.
    - cron: '30 22 * * 1-5'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - news
          - update
          - matrix

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Determine job from schedule
        id: job
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          INPUT="${{ github.event.inputs.job }}"

          if [ "$INPUT" = "news" ]; then
            echo "task=news" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "update" ]; then
            echo "task=update" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "matrix" ]; then
            echo "task=matrix" >> $GITHUB_OUTPUT
          elif [ "$INPUT" = "all" ]; then
            echo "task=all" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ]; then
            echo "task=news" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "18" ]; then
            echo "task=news" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "21" ]; then
            echo "task=news" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "22" ] && [ "$MINUTE" -lt "20" ]; then
            echo "task=update" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "22" ] && [ "$MINUTE" -ge "20" ]; then
            echo "task=matrix" >> $GITHUB_OUTPUT
          else
            echo "task=update" >> $GITHUB_OUTPUT
          fi

      - name: Run intraday news update
        if: steps.job.outputs.task == 'news' || steps.job.outputs.task == 'all'
        working-directory: backend
        run: npm run update:news
        env:
          REDIS_URL:           ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:    ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:         ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run EOD master update
        if: steps.job.outputs.task == 'update' || steps.job.outputs.task == 'all'
        working-directory: backend
        run: npm run update
        env:
          REDIS_URL:           ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:     ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:    ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:         ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:     ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:         ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run correlation matrix
        # Runs after EOD update (22:30 UTC) OR when explicitly triggered
        if: steps.job.outputs.task == 'matrix' || steps.job.outputs.task == 'all'
        working-directory: backend
        run: npm run calculate-matrix
        env:
          REDIS_URL:           ${{ secrets.REDIS_URL }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
