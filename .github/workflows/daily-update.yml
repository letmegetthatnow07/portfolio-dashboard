name: Market & News Data Pipeline

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 9:00 AM ET (News Run 1)
    - cron: '0 17 * * 1-5'  # 1:00 PM ET (News Run 2)
    - cron: '15 20 * * 1-5' # 4:15 PM ET (News Run 3)
    - cron: '0 21 * * 1-5'  # 5:00 PM ET (Master EOD Run)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which engine to run?'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - news
          - matrix

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Determine Run Type
        id: run-logic
        run: |
          HOUR=$(date -u +"%H")
          
          # If triggered manually, use the dropdown choice
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.run_type }}" == "master" ]; then
              echo "SCRIPT_TO_RUN=npm run update" >> $GITHUB_ENV
            elif [ "${{ github.event.inputs.run_type }}" == "matrix" ]; then
              echo "SCRIPT_TO_RUN=npm run calculate-matrix" >> $GITHUB_ENV
            else
              echo "SCRIPT_TO_RUN=npm run update:news" >> $GITHUB_ENV
            fi
          # If triggered by schedule, determine by UTC hour (21 = 5PM ET)
          elif [ "$HOUR" == "21" ]; then
            echo "SCRIPT_TO_RUN=npm run update" >> $GITHUB_ENV
          else
            echo "SCRIPT_TO_RUN=npm run update:news" >> $GITHUB_ENV
          fi

      - name: Execute Pipeline
        working-directory: backend
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY: ${{ secrets.SEC_API_KEY }}
        run: ${{ env.SCRIPT_TO_RUN }}

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit CSV History
        run: |
          git add backend/data/score_history.csv || true
          git commit -m "📊 Auto: EOD History Update $(date)" || true
          git push || true
