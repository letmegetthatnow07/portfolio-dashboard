name: Market & News Data Pipeline

# ─── TWO SEPARATE JOBS — eliminates the delay vulnerability ────────────────────
#
# PROBLEM WITH THE OLD DESIGN:
#   One job used HOUR=$(date -u +"%H") to decide master vs news.
#   GitHub Actions delays scheduled runs 15-60 min during high load.
#   If the 22:00 UTC cron started at 23:05 UTC, HOUR="23" → fell into
#   the 'else' branch → ran the news script instead of the master script.
#   This is why Supabase and GitHub CSV stopped receiving data after April 3.
#   The pipeline appeared to run 5x/day correctly, but master never fired.
#
# FIX:
#   Split into two completely separate jobs with their own cron schedules.
#   Each job knows its own purpose — no clock detection needed.
#   Even a 90-minute GitHub delay can't misroute a job.

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Which engine to run manually?'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - news
          - matrix

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1: EOD MASTER — runs once daily, scores all stocks, writes Supabase + CSV
# Cron: 22:00 UTC = 5:00 PM ET (well after US close at 4 PM ET + 45 min)
# Even with a 90-min GitHub delay, this still processes the correct trading day.
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  eod-master:
    name: EOD Master Run
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' && github.event.schedule == '0 22 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'master')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run master update + correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FMP_API_KEY:          ${{ secrets.FMP_API_KEY }}
          POLYGON_API_KEY:      ${{ secrets.POLYGON_API_KEY }}
          SEC_API_KEY:          ${{ secrets.SEC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run update && npm run calculate-matrix

      - name: Run Earnings Event Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run earnings-event || true

      - name: Run Filing Narrative Analyser
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: npm run filing-narrative || true

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit score history CSV
        run: |
          git add backend/data/score_history.csv || true
          git commit -m "📊 EOD History $(date -u +%Y-%m-%d)" || true
          git pull --rebase origin main || true
          git push || true

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 2: INTRADAY NEWS — runs 3x daily, updates news scores only
  # 9 AM ET, 1 PM ET, 4:15 PM ET = 14:00, 18:00, 21:15 UTC
  # ══════════════════════════════════════════════════════════════════════════════
  intraday-news:
    name: Intraday News Update
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 14 * * 1-5' ||
        github.event.schedule == '0 18 * * 1-5' ||
        github.event.schedule == '15 21 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'news')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run intraday news update
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run update:news

  # ══════════════════════════════════════════════════════════════════════════════
  # JOB 3: MATRIX ONLY — manual trigger for recalculating correlation
  # ══════════════════════════════════════════════════════════════════════════════
  correlation-matrix:
    name: Correlation Matrix Only
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_type == 'matrix'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run correlation matrix
        working-directory: backend
        env:
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run calculate-matrix

# ─── CRON SCHEDULE SUMMARY ────────────────────────────────────────────────────
# 0 14 * * 1-5   = 9:00 AM ET   — intraday news (job 2)
# 0 18 * * 1-5   = 1:00 PM ET   — intraday news (job 2)
# 15 21 * * 1-5  = 4:15 PM ET   — intraday news (job 2)
# 0 22 * * 1-5   = 5:00 PM ET   — EOD master (job 1)
